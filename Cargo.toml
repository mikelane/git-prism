[package]
name = "git-prism"
version = "0.1.0"
edition = "2024"
description = "Agent-optimized git data MCP server — structured change manifests and full file snapshots for LLM agents"
license = "Apache-2.0"
repository = "https://github.com/mikelane/git-prism"
keywords = ["mcp", "git", "llm", "agent", "tree-sitter"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
rmcp = { version = "1.3", features = ["server", "transport-io"] }
tokio = { version = "1", features = ["full"] }
gix = { version = "0.80", default-features = false, features = ["basic", "blob-diff"] }
tree-sitter = "0.25"
tree-sitter-go = "0.25"
tree-sitter-python = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-rust = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
glob = "0.3"

[dev-dependencies]
tempfile = "3"
insta = { version = "1", features = ["json"] }
