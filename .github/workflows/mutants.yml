name: Mutation Testing

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/mutants.toml"
  push:
    branches: [main]
    paths:
      - "src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/mutants.toml"
      - ".github/workflows/mutants.yml"
  schedule:
    # Weekly full run: Sunday at 03:00 UTC
    - cron: "0 3 * * 0"

env:
  CARGO_TERM_COLOR: always
  CARGO_MUTANTS_VERSION: "27.0.0"

jobs:
  # On PRs: incremental mode — only mutants in changed files.
  incremental:
    name: Mutants (incremental)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-mutants
            ~/.cargo/bin/cargo-nextest
            target
          key: ${{ runner.os }}-mutants-${{ env.CARGO_MUTANTS_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-${{ env.CARGO_MUTANTS_VERSION }}-

      - name: Install cargo-mutants and nextest
        run: |
          if ! cargo mutants --version 2>/dev/null | grep -q "$CARGO_MUTANTS_VERSION"; then
            cargo install "cargo-mutants@$CARGO_MUTANTS_VERSION"
          fi
          if ! cargo-nextest --version 2>/dev/null; then
            cargo install --locked cargo-nextest
          fi

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Generate diff against base
        run: git diff "origin/${{ github.base_ref }}"...HEAD > pr.diff

      - name: Run cargo-mutants on changed files
        # Incremental mutation testing is informational on PRs: a failing mutant should
        # surface in the "Report mutation score" step, not block the PR. We use
        # continue-on-error rather than `|| true` so the failure is visible in the GitHub
        # UI (yellow warning icon) rather than silently masked. The integrity workflow
        # bans `|| true` in workflow files because of incidents where it hid real bugs
        # for multiple releases.
        continue-on-error: true
        run: cargo mutants --timeout 300 --jobs 4 --copy-target true --test-tool nextest --in-diff pr.diff

      - name: Report mutation score
        if: always()
        run: |
          if [ -f mutants.out/outcomes.json ]; then
            python3 - <<'SCRIPT'
          import json

          with open("mutants.out/outcomes.json") as f:
              data = json.load(f)
          outcomes = data.get("outcomes", data) if isinstance(data, dict) else data
          killed = sum(1 for o in outcomes if o.get("summary") in ("CaughtMutant", "Timeout"))
          survived = sum(1 for o in outcomes if o.get("summary") == "MissedMutant")
          total = killed + survived
          score = (killed / total * 100) if total > 0 else 100.0
          print(f"Mutation score: {score:.1f}% ({killed} killed, {survived} survived)")
          SCRIPT
          fi

      - name: Upload mutants output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-incremental
          path: mutants.out/

  # On main push + schedule: full suite split across 4 shards.
  # Each shard tests ~115 mutants in parallel.
  full:
    name: Mutants (shard ${{ matrix.shard }})
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ["0/4", "1/4", "2/4", "3/4"]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-mutants
            ~/.cargo/bin/cargo-nextest
            target
          key: ${{ runner.os }}-mutants-${{ env.CARGO_MUTANTS_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-${{ env.CARGO_MUTANTS_VERSION }}-

      - name: Install cargo-mutants and nextest
        run: |
          if ! cargo mutants --version 2>/dev/null | grep -q "$CARGO_MUTANTS_VERSION"; then
            cargo install "cargo-mutants@$CARGO_MUTANTS_VERSION"
          fi
          if ! cargo-nextest --version 2>/dev/null; then
            cargo install --locked cargo-nextest
          fi

      - name: Run mutation testing (shard ${{ matrix.shard }})
        run: cargo mutants --timeout 300 --jobs 4 --copy-target true --test-tool nextest --shard ${{ matrix.shard }}

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-shard-${{ strategy.job-index }}
          path: mutants.out/

  # Aggregate shard results and post summary.
  summary:
    name: Mutants (summary)
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: full
    runs-on: ubuntu-latest
    steps:
      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mutants-shard-*
          path: shards/

      - name: Aggregate and generate summary
        run: |
          python3 - <<'SCRIPT'
          import json, os, glob, textwrap

          killed = survived = unviable = 0
          for outcomes_file in sorted(glob.glob("shards/*/outcomes.json")):
              with open(outcomes_file) as f:
                  data = json.load(f)
              outcomes = data.get("outcomes", data) if isinstance(data, dict) else data
              killed += sum(1 for o in outcomes if o.get("summary") in ("CaughtMutant", "Timeout"))
              survived += sum(1 for o in outcomes if o.get("summary") == "MissedMutant")
              unviable += sum(1 for o in outcomes if o.get("summary") == "Unviable")

          total_testable = killed + survived
          if total_testable > 0:
              score = killed / total_testable * 100
              score_str = f"{score:.1f}%"
              verdict = "✅ Score meets 90% threshold." if score >= 90 else "⚠️ Score below 90% threshold — see surviving mutants in the artifact."
          else:
              score_str = "N/A (no testable mutants)"
              verdict = "ℹ️ No testable mutants were generated."

          summary = textwrap.dedent(f"""\
          ## Mutation Testing Results

          | Metric | Value |
          |--------|-------|
          | Mutants killed | {killed} |
          | Mutants survived | {survived} |
          | Unviable | {unviable} |
          | **Mutation score** | **{score_str}** |

          {verdict}
          """)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)

          if total_testable > 0 and score < 90:
              print(f"FAIL: mutation score {score:.1f}% is below 90% threshold")
              raise SystemExit(1)
          SCRIPT
